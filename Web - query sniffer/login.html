<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Sniffer - Login</title>
    <link rel="stylesheet" href="css/login-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <header class="navbar">
        <div class="logo-container">
            <span class="main-logo-text">🔍</span> QUERY SNIFFER
        </div>

        <div class="auth-buttons">
            <a href="sobre.html" class="btn-primary">Sobre</a>
             <a href="index.html" class="btn-primary">Home</a>
             
        </div>
    </header>

    <main class="main-content">
        <div class="login-card glassmorphism">
            <div class="card-header">
                <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="#4da8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <polyline points="9 10 12 13 15 10"></polyline>
                </svg>
            </div>
            <h2>ENTRAR NO QUERY SNIFFER</h2>
            <p>Gerencie a perfomance do seu banco de dados com IA.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#607c9b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" placeholder="Email" required>
                </div>
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#607c9b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" placeholder="Senha" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">Lembrar dados
                        <input type="checkbox">
                        <span class="checkmark"></span>
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" class="btn-primary-login">ENTRAR</button>
            </form>
            
            <div class="social-sign-in">
                <p>Ou acesse com:</p>
                <div class="social-icons-container">
                    <a href="#" class="social-icon google"><svg viewBox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307c-1.893-1.893-4.507-3.173-8.213-3.173-6.507 0-11.88 5.373-11.88 11.88s5.373 11.88 11.88 11.88c3.56 0 6.507-1.187 8.8-3.56 2.347-2.347 3.013-5.613 3.013-8.32 0-.853-.067-1.613-.187-2.347h-11.693z" fill="#4285F4"/></svg></a>
                    <a href="#" class="social-icon github"><svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" fill="#fff"/></svg></a>
                </div>
            </div>
            
            <div class="card-footer">
                <p>Novo usuário? <a href="#" class="create-account-link">Cria uma conta</a></p>
            </div>
        </div>
    </main>
