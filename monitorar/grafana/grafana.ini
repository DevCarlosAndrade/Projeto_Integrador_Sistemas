#####################################
# Configuração geral
#####################################
[server]
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = http://localhost:3000/
serve_from_sub_path = false

#####################################
# Segurança
#####################################
[security]
admin_user = admin
admin_password = admin123
allow_embedding = true

#####################################
# Login
#####################################
[auth]
disable_login_form = false

[auth.anonymous]
enabled = true
org_role = Viewer

#####################################
# Banco de dados interno do Grafana
#####################################
[database]
type = sqlite3
path = grafana.db

#####################################
# Logs
#####################################
[log]
mode = console
level = info

#####################################
# Dashboards
#####################################
[dashboards]
default_home_dashboard_path =

#####################################
# Provisionamento (opcional)
#####################################
[paths]
provisioning = /etc/grafana/provisioning

#####################################
# Alertas
#####################################
[alerting]
enabled = true

#####################################
# Métricas internas
#####################################
[metrics]
enabled = true